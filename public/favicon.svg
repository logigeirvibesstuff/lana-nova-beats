<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Music note: filled notehead + stem + flag -->
  <!-- Notehead -->
  <ellipse cx="10" cy="24" rx="6" ry="4.5" transform="rotate(-15 10 24)" fill="#5b21ff"/>
  <!-- Stem -->
  <rect x="15.5" y="6" width="2.5" height="18" rx="1.25" fill="#1a1033"/>
  <!-- Flag -->
  <path d="M18 6 Q28 10 24 18" stroke="#5b21ff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
